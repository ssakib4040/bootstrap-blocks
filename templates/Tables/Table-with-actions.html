<div class="container py-4 py-xl-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1">Users</h2>
      <p class="text-muted mb-0">Manage all registered users</p>
    </div>
    <button class="btn btn-primary" type="button">+ Add User</button>
  </div>
  <div class="table-responsive">
    <table class="table table-borderless align-middle">
      <thead class="table-light">
        <tr>
          <th class="ps-3">User</th>
          <th>Plan</th>
          <th>Joined</th>
          <th>Status</th>
          <th class="text-end pe-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="ps-3">
            <div class="d-flex align-items-center gap-2">
              <div
                class="rounded-circle bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center fw-bold flex-shrink-0"
                style="width: 36px; height: 36px"
              >
                A
              </div>
              <div>
                <div class="fw-semibold">Alice Johnson</div>
                <div class="text-muted small">alice@example.com</div>
              </div>
            </div>
          </td>
          <td>Pro</td>
          <td>Jan 14, 2025</td>
          <td>
            <span
              class="badge bg-success-subtle text-success border border-success-subtle"
              >Active</span
            >
          </td>
          <td class="text-end pe-3">
            <button class="btn btn-sm btn-outline-secondary me-1" type="button">
              Edit
            </button>
            <button class="btn btn-sm btn-outline-danger" type="button">
              Delete
            </button>
          </td>
        </tr>
        <tr>
          <td class="ps-3">
            <div class="d-flex align-items-center gap-2">
              <div
                class="rounded-circle bg-warning bg-opacity-10 text-warning d-flex align-items-center justify-content-center fw-bold flex-shrink-0"
                style="width: 36px; height: 36px"
              >
                B
              </div>
              <div>
                <div class="fw-semibold">Bob Smith</div>
                <div class="text-muted small">bob@example.com</div>
              </div>
            </div>
          </td>
          <td>Free</td>
          <td>Mar 2, 2025</td>
          <td>
            <span
              class="badge bg-warning-subtle text-warning border border-warning-subtle"
              >Pending</span
            >
          </td>
          <td class="text-end pe-3">
            <button class="btn btn-sm btn-outline-secondary me-1" type="button">
              Edit
            </button>
            <button class="btn btn-sm btn-outline-danger" type="button">
              Delete
            </button>
          </td>
        </tr>
        <tr>
          <td class="ps-3">
            <div class="d-flex align-items-center gap-2">
              <div
                class="rounded-circle bg-danger bg-opacity-10 text-danger d-flex align-items-center justify-content-center fw-bold flex-shrink-0"
                style="width: 36px; height: 36px"
              >
                C
              </div>
              <div>
                <div class="fw-semibold">Carol White</div>
                <div class="text-muted small">carol@example.com</div>
              </div>
            </div>
          </td>
          <td>Enterprise</td>
          <td>Nov 20, 2024</td>
          <td>
            <span
              class="badge bg-danger-subtle text-danger border border-danger-subtle"
              >Suspended</span
            >
          </td>
          <td class="text-end pe-3">
            <button class="btn btn-sm btn-outline-secondary me-1" type="button">
              Edit
            </button>
            <button class="btn btn-sm btn-outline-danger" type="button">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
