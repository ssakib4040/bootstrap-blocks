<div class="container py-4 py-xl-5">
  <div class="row mb-5">
    <div class="col-md-8 col-xl-6 text-center mx-auto">
      <h2>Breadcrumb Styles</h2>
      <p>Navigation breadcrumbs for multi-level pages.</p>
    </div>
  </div>
  <div class="d-grid gap-5">
    <div>
      <h6 class="text-muted mb-2 small text-uppercase fw-bold">Default</h6>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="#">Home</a></li>
          <li class="breadcrumb-item"><a href="#">Products</a></li>
          <li class="breadcrumb-item active" aria-current="page">Wireless Headphones</li>
        </ol>
      </nav>
    </div>
    <div>
      <h6 class="text-muted mb-2 small text-uppercase fw-bold">With background</h6>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-light rounded px-3 py-2 d-inline-flex">
          <li class="breadcrumb-item"><a href="#">Home</a></li>
          <li class="breadcrumb-item"><a href="#">Docs</a></li>
          <li class="breadcrumb-item"><a href="#">Components</a></li>
          <li class="breadcrumb-item active" aria-current="page">Breadcrumb</li>
        </ol>
      </nav>
    </div>
    <div>
      <h6 class="text-muted mb-2 small text-uppercase fw-bold">Custom divider ( › )</h6>
      <nav style="--bs-breadcrumb-divider: '›';" aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="#">Home</a></li>
          <li class="breadcrumb-item"><a href="#">Settings</a></li>
          <li class="breadcrumb-item active" aria-current="page">Profile</li>
        </ol>
      </nav>
    </div>
  </div>
</div>
