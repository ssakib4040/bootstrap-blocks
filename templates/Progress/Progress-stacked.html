<div class="container py-4 py-xl-5">
  <div class="row mb-5">
    <div class="col-md-8 col-xl-6 text-center mx-auto">
      <h2 class="fw-bold">Traffic breakdown</h2>
      <p class="text-muted">How visitors are finding your site this month.</p>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-medium">Organic search</span>
          <span class="text-muted">42%</span>
        </div>
        <div class="progress rounded-3" style="height: 18px">
          <div
            class="progress-bar bg-primary"
            style="width: 42%"
            role="progressbar"
            aria-valuenow="42"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-medium">Direct</span>
          <span class="text-muted">24%</span>
        </div>
        <div class="progress rounded-3" style="height: 18px">
          <div
            class="progress-bar bg-success"
            style="width: 24%"
            role="progressbar"
            aria-valuenow="24"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-medium">Social media</span>
          <span class="text-muted">18%</span>
        </div>
        <div class="progress rounded-3" style="height: 18px">
          <div
            class="progress-bar bg-info"
            style="width: 18%"
            role="progressbar"
            aria-valuenow="18"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-medium">Referral</span>
          <span class="text-muted">11%</span>
        </div>
        <div class="progress rounded-3" style="height: 18px">
          <div
            class="progress-bar bg-warning"
            style="width: 11%"
            role="progressbar"
            aria-valuenow="11"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>

      <div class="mb-5">
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-medium">Email</span>
          <span class="text-muted">5%</span>
        </div>
        <div class="progress rounded-3" style="height: 18px">
          <div
            class="progress-bar bg-danger"
            style="width: 5%"
            role="progressbar"
            aria-valuenow="5"
            aria-valuemin="0"
            aria-valuemax="100"
          ></div>
        </div>
      </div>

      <div class="card border-0 bg-light p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-medium">Combined overview</span>
          <small class="text-muted">100%</small>
        </div>
        <div class="progress rounded-3" style="height: 22px">
          <div
            class="progress-bar bg-primary"
            style="width: 42%"
            title="Organic 42%"
          ></div>
          <div
            class="progress-bar bg-success"
            style="width: 24%"
            title="Direct 24%"
          ></div>
          <div
            class="progress-bar bg-info"
            style="width: 18%"
            title="Social 18%"
          ></div>
          <div
            class="progress-bar bg-warning"
            style="width: 11%"
            title="Referral 11%"
          ></div>
          <div
            class="progress-bar bg-danger"
            style="width: 5%"
            title="Email 5%"
          ></div>
        </div>
        <div class="d-flex flex-wrap gap-3 mt-3">
          <span class="d-flex align-items-center gap-1 small"
            ><span class="badge bg-primary">&nbsp;</span> Organic</span
          >
          <span class="d-flex align-items-center gap-1 small"
            ><span class="badge bg-success">&nbsp;</span> Direct</span
          >
          <span class="d-flex align-items-center gap-1 small"
            ><span class="badge bg-info">&nbsp;</span> Social</span
          >
          <span class="d-flex align-items-center gap-1 small"
            ><span class="badge bg-warning">&nbsp;</span> Referral</span
          >
          <span class="d-flex align-items-center gap-1 small"
            ><span class="badge bg-danger">&nbsp;</span> Email</span
          >
        </div>
      </div>
    </div>
  </div>
</div>
