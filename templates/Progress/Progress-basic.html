<div class="container py-4 py-xl-5">
  <div class="row mb-5">
    <div class="col-md-8 col-xl-6 text-center mx-auto">
      <h2>Progress Bars</h2>
      <p>Visual indicators of completion, usage, and performance.</p>
    </div>
  </div>
  <div class="row">
    <div class="col-md-8 mx-auto d-grid gap-4">
      <div>
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-semibold small">Storage Used</span>
          <span class="text-muted small">72%</span>
        </div>
        <div class="progress" style="height: 10px">
          <div class="progress-bar" style="width: 72%"></div>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-semibold small">Project Progress</span>
          <span class="text-muted small">45%</span>
        </div>
        <div class="progress" style="height: 10px">
          <div class="progress-bar bg-success" style="width: 45%"></div>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-semibold small">Monthly Budget</span>
          <span class="text-muted small">91%</span>
        </div>
        <div class="progress" style="height: 10px">
          <div class="progress-bar bg-danger" style="width: 91%"></div>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-semibold small">Customer Satisfaction</span>
          <span class="text-muted small">68%</span>
        </div>
        <div class="progress" style="height: 10px">
          <div class="progress-bar bg-warning" style="width: 68%"></div>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-semibold small">Team Capacity</span>
          <span class="text-muted small">38%</span>
        </div>
        <div class="progress" style="height: 10px">
          <div class="progress-bar bg-info" style="width: 38%"></div>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-semibold small">Striped Animated</span>
          <span class="text-muted small">60%</span>
        </div>
        <div class="progress" style="height: 10px">
          <div
            class="progress-bar progress-bar-striped progress-bar-animated"
            style="width: 60%"
          ></div>
        </div>
      </div>
    </div>
  </div>
</div>
