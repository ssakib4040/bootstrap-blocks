<div class="container py-4 py-xl-5">
  <div class="row d-flex justify-content-center">
    <div class="col-md-6 col-lg-5 col-xl-4">
      <div class="card shadow-sm">
        <div class="card-body p-4 p-xl-5">
          <div class="text-center mb-4">
            <h3 class="fw-bold">Welcome back</h3>
            <p class="text-muted">Sign in to your account</p>
          </div>
          <form>
            <div class="mb-3">
              <label class="form-label" for="loginEmail">Email address</label>
              <input class="form-control" type="email" id="loginEmail" placeholder="name@example.com" />
            </div>
            <div class="mb-3">
              <div class="d-flex justify-content-between">
                <label class="form-label" for="loginPassword">Password</label>
                <a href="#" class="small text-primary">Forgot password?</a>
              </div>
              <input class="form-control" type="password" id="loginPassword" placeholder="Enter your password" />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <button class="btn btn-primary w-100" type="submit">Sign in</button>
          </form>
          <hr />
          <p class="text-center text-muted small mb-0">Don't have an account? <a href="#">Sign up</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
