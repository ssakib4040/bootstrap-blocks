<div class="container py-4 py-xl-5">
  <div class="row g-5">
    <div class="col-md-3">
      <h4 class="fw-bold mb-4">Profile Settings</h4>
      <div class="text-center mb-4">
        <div class="position-relative d-inline-block">
          <img
            class="rounded-circle object-fit-cover"
            width="100"
            height="100"
            src="https://cdn.bootstrapstudio.io/placeholders/1400x800.png"
            alt="Avatar"
          />
          <button
            class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle p-1 lh-1"
            type="button"
            title="Change photo"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              fill="currentColor"
              viewBox="0 0 16 16"
            >
              <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0" />
              <path
                d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0"
              />
            </svg>
          </button>
        </div>
        <div class="mt-2 text-muted small">JPG, PNG or GIF · max 2 MB</div>
      </div>
      <nav class="d-grid gap-1">
        <a href="#" class="btn btn-primary text-start">General</a>
        <a href="#" class="btn btn-light text-start text-muted">Password</a>
        <a href="#" class="btn btn-light text-start text-muted"
          >Notifications</a
        >
        <a href="#" class="btn btn-light text-start text-muted">Billing</a>
      </nav>
    </div>
    <div class="col-md-9">
      <form>
        <div class="row g-4">
          <div class="col-12">
            <h6 class="text-uppercase text-muted fw-bold small mb-3">
              Personal Information
            </h6>
          </div>

          <div class="col-md-6">
            <label class="form-label" for="profileFirst">First name</label>
            <input
              class="form-control"
              type="text"
              id="profileFirst"
              value="Alice"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="profileLast">Last name</label>
            <input
              class="form-control"
              type="text"
              id="profileLast"
              value="Johnson"
            />
          </div>
          <div class="col-md-8">
            <label class="form-label" for="profileEmail">Email address</label>
            <input
              class="form-control"
              type="email"
              id="profileEmail"
              value="alice@example.com"
            />
          </div>
          <div class="col-md-4">
            <label class="form-label" for="profilePhone">Phone</label>
            <input
              class="form-control"
              type="tel"
              id="profilePhone"
              placeholder="+1 555 000 0000"
            />
          </div>
          <div class="col-12">
            <label class="form-label" for="profileBio">Bio</label>
            <textarea
              class="form-control"
              id="profileBio"
              rows="3"
              placeholder="Tell us a little about yourself..."
            ></textarea>
            <div class="form-text">Max 160 characters.</div>
          </div>

          <div class="col-12 border-top pt-4 mt-2">
            <h6 class="text-uppercase text-muted fw-bold small mb-3">
              Social Links
            </h6>
          </div>

          <div class="col-md-6">
            <label class="form-label" for="profileTwitter">Twitter / X</label>
            <div class="input-group">
              <span class="input-group-text text-muted">x.com/</span>
              <input
                class="form-control"
                type="text"
                id="profileTwitter"
                placeholder="username"
              />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="profileGithub">GitHub</label>
            <div class="input-group">
              <span class="input-group-text text-muted">github.com/</span>
              <input
                class="form-control"
                type="text"
                id="profileGithub"
                placeholder="username"
              />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="profileLinkedin">LinkedIn</label>
            <div class="input-group">
              <span class="input-group-text text-muted">linkedin.com/in/</span>
              <input
                class="form-control"
                type="text"
                id="profileLinkedin"
                placeholder="username"
              />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="profileWebsite">Website</label>
            <input
              class="form-control"
              type="url"
              id="profileWebsite"
              placeholder="https://yourwebsite.com"
            />
          </div>

          <div class="col-12 d-flex gap-2 border-top pt-4 mt-2">
            <button class="btn btn-primary" type="submit">Save changes</button>
            <button class="btn btn-outline-secondary" type="button">
              Cancel
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
