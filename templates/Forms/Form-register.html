<div class="container py-4 py-xl-5">
  <div class="row d-flex justify-content-center">
    <div class="col-md-8 col-lg-6 col-xl-5">
      <div class="card shadow-sm">
        <div class="card-body p-4 p-xl-5">
          <div class="text-center mb-4">
            <h3 class="fw-bold">Create account</h3>
            <p class="text-muted">Join us today, it is free</p>
          </div>
          <form>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label" for="regFirstName">First name</label>
                <input
                  class="form-control"
                  type="text"
                  id="regFirstName"
                  placeholder="John"
                />
              </div>
              <div class="col-6">
                <label class="form-label" for="regLastName">Last name</label>
                <input
                  class="form-control"
                  type="text"
                  id="regLastName"
                  placeholder="Doe"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="regEmail">Email address</label>
              <input
                class="form-control"
                type="email"
                id="regEmail"
                placeholder="name@example.com"
              />
            </div>
            <div class="mb-3">
              <label class="form-label" for="regPassword">Password</label>
              <input
                class="form-control"
                type="password"
                id="regPassword"
                placeholder="Create a password"
              />
            </div>
            <div class="mb-3">
              <label class="form-label" for="regConfirmPassword"
                >Confirm password</label
              >
              <input
                class="form-control"
                type="password"
                id="regConfirmPassword"
                placeholder="Repeat your password"
              />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="agreeTerms" />
              <label class="form-check-label" for="agreeTerms"
                >I agree to the <a href="#">Terms of Service</a> and
                <a href="#">Privacy Policy</a></label
              >
            </div>
            <button class="btn btn-primary w-100" type="submit">
              Create account
            </button>
          </form>
          <hr />
          <p class="text-center text-muted small mb-0">
            Already have an account? <a href="#">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
